<svg xmlns="http://www.w3.org/2000/svg" width="650" height="500" viewBox="0 0 650 500">
<rect width="650" height="500" fill="#dbe7e5"/><rect x="20" y="20" width="610" height="460" fill="none" stroke="#172222" stroke-width="4"/>
<text x="42" y="62" font-family="Georgia" font-size="30" fill="#172222">Weather Glass Cabinet Card</text>
<text x="44" y="88" font-family="Courier New" font-size="13">Historic storm glasses used camphor mixtures; they are decorative, not reliable instruments.</text>
<g transform="translate(250 112)">
<path d="M56 0 C22 55 18 188 34 266 C40 296 72 296 78 266 C94 188 90 55 56 0Z" fill="#eefafa" stroke="#172222" stroke-width="4"/>
<path d="M39 150 C55 166 73 157 84 145 L78 266 C72 296 40 296 34 266 Z" fill="#b8d9e0" opacity=".9"/>
<path d="M44 185 L70 160 L78 197 L51 216 L82 236 L42 247" fill="none" stroke="#f7ffff" stroke-width="5"/>
<rect x="26" y="270" width="62" height="35" fill="#2b2118"/>
</g>
<g font-family="Courier New" font-size="14" fill="#172222">
<text x="48" y="140" font-weight="bold">OLD FORMULA COMPONENTS</text>
<text x="48" y="166">camphor</text><text x="48" y="190">potassium nitrate</text><text x="48" y="214">ammonium chloride</text><text x="48" y="238">ethanol + water</text>
<text x="400" y="140" font-weight="bold">SAFER DISPLAY SUBSTITUTE</text>
<text x="400" y="166">sealed glass</text><text x="400" y="190">epsom salt crystals</text><text x="400" y="214">blue food dye</text><text x="400" y="238">label honestly</text>
<rect x="48" y="348" width="554" height="76" fill="#f5f0d0" stroke="#172222" stroke-width="2"/>
<text x="66" y="374">Actual forecasting skill: low pressure + falling barometer + thickening cloud.</text>
<text x="66" y="398">Cabinet folklore: clear liquid = fair, cloudy = rain, stars = frost, threads = wind.</text>
</g>
</svg>
