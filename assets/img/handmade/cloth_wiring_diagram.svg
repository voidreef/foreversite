<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460">
<rect width="760" height="460" fill="#e9e1cc"/><rect x="24" y="22" width="712" height="416" fill="none" stroke="#16110a" stroke-width="3"/>
<text x="44" y="60" font-family="Courier New" font-size="25">BX / CLOTH WIRE FIELD SKETCH</text>
<text x="44" y="86" font-family="Courier New" font-size="13">Not repair advice. Identification notes for old-house archaeology; hire an electrician for decisions.</text>
<g transform="translate(55 130)">
<rect x="0" y="20" width="260" height="130" fill="#bfbdad" stroke="#111" stroke-width="3"/>
<path d="M20 80 C80 10,155 150,238 58" fill="none" stroke="#221a14" stroke-width="16" stroke-linecap="round"/>
<path d="M20 80 C80 10,155 150,238 58" fill="none" stroke="#5a5149" stroke-width="8" stroke-dasharray="10 7" stroke-linecap="round"/>
<text x="18" y="185" font-family="Courier New" font-size="14">armored cable: spiral metal jacket</text>
</g>
<g transform="translate(405 120)" font-family="Courier New" font-size="14">
<path d="M10 50 C70 5,126 88,190 34 C240 -4,290 50,322 18" fill="none" stroke="#6b201a" stroke-width="7"/>
<path d="M10 92 C78 138,132 44,195 108 C248 160,283 92,328 134" fill="none" stroke="#181c55" stroke-width="7"/>
<g stroke="#b88425" stroke-width="9"><line x1="124" y1="24" x2="171" y2="126"/><line x1="165" y1="22" x2="120" y2="130"/></g>
<text x="0" y="188">cloth insulation becomes brittle with heat/age</text>
<text x="0" y="212">rubber under cloth may crack when disturbed</text>
<text x="0" y="236">missing equipment ground is common in older runs</text>
</g>
<g font-family="Courier New" font-size="13">
<rect x="56" y="350" width="648" height="58" fill="#fff6cf" stroke="#111" stroke-width="2"/>
<text x="76" y="374">Signs worth documenting: splices outside boxes, scorch marks, knob-and-tube remnants, aluminum branch wiring,</text>
<text x="76" y="394">two-prong receptacles on ungrounded circuits, fuse over-sizing, cloth wire touching hot fixtures.</text>
</g>
</svg>
