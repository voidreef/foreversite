<g transform="translate(404 112) rotate(-3)"><rect width="132" height="60" fill="#e1c7ff" stroke="#4c3b20" stroke-width="3" rx="8"/><text x="66" y="26" font-size="15">DO NOT</text><text x="66" y="47" font-size="22">DATE</text></g>
</g>
<path d="M48 376c145-20 239 19 378-9 106-22 176 6 288-11" fill="none" stroke="#ad9273" stroke-width="4"/>
