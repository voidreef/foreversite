<g transform="translate(328 0) rotate(2)"><rect width="132" height="60" fill="#c9e8ad" stroke="#4c3b20" stroke-width="3" rx="8"/><text x="66" y="26" font-size="15">ROUTE 4</text><text x="66" y="47" font-size="22">TUES</text></g>
<g transform="translate(492 0)"><rect width="132" height="60" fill="#f4d7df" stroke="#4c3b20" stroke-width="3" rx="8"/><text x="66" y="26" font-size="15">ODOR OK</text><text x="66" y="47" font-size="22">???</text></g>
